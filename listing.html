<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biochar.market - Listing Detail</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/commission.js"></script>
    <script src="js/multiselect.js"></script>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/listings.css" />
    <script src="js/airtable.js"></script>
    <script src="js/dealroom.js"></script>
    <script src="js/listing.js"></script>
    <style>
      .listing-page {
        padding: var(--space-12) 0;
      }

      .listing-shell {
        display: grid;
        gap: var(--space-10);
      }

      .listing-header,
      .scorecard-section,
      .suitability-section,
      .description-section,
      .availability-section,
      .inquiry-section {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: var(--space-8);
      }

      .listing-header h1 {
        font-size: var(--font-size-3xl);
        line-height: var(--line-height-tight);
      }

      .listing-location {
        margin-top: var(--space-2);
        color: var(--color-text-secondary);
      }

      .listing-top-meta {
        margin-top: var(--space-4);
      }

      .headline-row {
        margin-top: var(--space-4);
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-4);
        align-items: baseline;
      }

      .headline-price {
        color: var(--color-accent);
        font-size: var(--font-size-4xl);
        font-weight: var(--font-weight-bold);
        line-height: var(--line-height-tight);
      }

      .headline-unit {
        color: var(--color-text-secondary);
        font-size: var(--font-size-base);
      }

      .headline-detail {
        color: var(--color-text-secondary);
        font-size: var(--font-size-sm);
      }

      .rating-line {
        margin-top: var(--space-4);
        font-size: var(--font-size-sm);
        color: var(--color-text-secondary);
      }

      .star-rating {
        color: var(--color-warning);
        letter-spacing: 1px;
        margin-left: var(--space-2);
      }

      .section-title-row {
        display: flex;
        align-items: center;
        gap: var(--space-3);
      }

      .section-title-row h2,
      .suitability-section h2,
      .description-section h2,
      .availability-section h2,
      .inquiry-section h2 {
        font-size: var(--font-size-2xl);
      }

      .verify-badge {
        padding: 2px var(--space-3);
        border-radius: 999px;
        font-size: var(--font-size-xs);
        font-weight: var(--font-weight-semibold);
      }

      .verify-badge.verified {
        background: var(--color-accent-light);
        color: var(--color-accent);
      }

      .verify-badge.self {
        background: #ececec;
        color: var(--color-text-secondary);
      }

      .scorecard-grid {
        margin-top: var(--space-6);
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: var(--space-4);
      }

      .scorecard-item {
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        padding: var(--space-4);
      }

      .scorecard-value {
        color: var(--color-accent);
        font-size: var(--font-size-2xl);
        font-weight: var(--font-weight-bold);
        line-height: var(--line-height-tight);
      }

      .scorecard-label {
        margin-top: var(--space-2);
        color: var(--color-text-muted);
        font-size: var(--font-size-sm);
      }

      .scorecard-note {
        margin-top: var(--space-2);
        color: var(--color-text-secondary);
        font-size: var(--font-size-sm);
      }

      .suitable-tags {
        margin-top: var(--space-4);
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
      }

      .suitable-tag {
        border: 1px solid var(--color-border);
        border-radius: 999px;
        padding: 2px var(--space-3);
        background: var(--color-warning-light);
        color: var(--color-warning);
        font-size: var(--font-size-sm);
      }

      .availability-list {
        margin-top: var(--space-4);
        display: grid;
        gap: var(--space-2);
        color: var(--color-text-secondary);
      }

      .availability-lead.ready {
        color: var(--color-accent);
      }

      .availability-lead.wait {
        color: var(--color-warning);
      }

      .inquiry-section p {
        margin-top: var(--space-2);
        color: var(--color-text-secondary);
      }

      #inquiry-form {
        margin-top: var(--space-6);
        display: grid;
        gap: var(--space-5);
        max-width: 640px;
      }

      #inquiry-form label {
        display: block;
        font-size: var(--font-size-sm);
        font-weight: var(--font-weight-medium);
      }

      #inquiry-form input,
      #inquiry-form textarea {
        width: 100%;
        margin-top: var(--space-2);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        padding: var(--space-3) var(--space-4);
        font-family: var(--font-sans);
        font-size: var(--font-size-base);
      }

      #commission-preview {
        background: var(--color-accent-light);
        border-radius: var(--radius-md);
        padding: var(--space-4);
        font-size: var(--font-size-sm);
        margin-top: var(--space-3);
      }

      #commission-preview p + p {
        margin-top: var(--space-2);
      }

      #form-success,
      #form-error {
        margin-top: var(--space-4);
      }

      #form-error {
        color: var(--color-warning);
      }

      .not-found {
        text-align: center;
        font-size: var(--font-size-lg);
        color: var(--color-text-secondary);
        padding: var(--space-12) 0;
      }

      .not-found a {
        color: var(--color-accent);
      }

      .site-footer {
        border-top: 1px solid var(--color-border);
        padding: var(--space-8) 0;
      }

      .footer-inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: var(--font-size-sm);
        color: var(--color-text-muted);
      }

      @media (max-width: 900px) {
        .scorecard-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="container nav-inner">
        <a class="nav-logo" href="index.html">BM</a>
        <div style="display: flex; gap: var(--space-3); align-items: center;">
          <a id="nav-login" class="btn btn-secondary" href="auth.html">Login</a>
          <a id="nav-profile" class="btn btn-secondary" href="profile.html" style="display: none;">Profile</a>
          <button id="nav-logout" class="btn btn-primary" type="button" style="display: none;">Log out</button>
        </div>
      </div>
    </nav>
    <div class="back-bar">
      <div class="container">
        <button class="back-btn" onclick="history.back()">← Back</button>
      </div>
    </div>

    <main class="listing-page">
      <div class="container">
        <div id="listing-detail"></div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <span>© 2025 Biochar.market</span>
        <span>United States · 2025</span>
      </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/delivered-cost.js"></script>
    <script>
      auth.onAuthStateChanged(function (user) {
        var login = document.getElementById('nav-login')
        var profile = document.getElementById('nav-profile')
        var logout = document.getElementById('nav-logout')
        if (!login || !profile || !logout) return
        if (user) {
          window.currentUser = user
          db.collection('users').doc(user.uid).get().then(function (doc) {
            window.userProfile = doc.exists ? doc.data() : null
          }).catch(function () {
            window.userProfile = null
          })
          login.style.display = 'none'
          profile.style.display = 'inline-flex'
          logout.style.display = 'inline-flex'
        } else {
          window.currentUser = null
          window.userProfile = null
          login.style.display = 'inline-flex'
          profile.style.display = 'none'
          logout.style.display = 'none'
        }
      })
      document.getElementById('nav-logout').addEventListener('click', function () {
        auth.signOut()
      })
    </script>
  </body>
</html>
