<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carbon Credit Listing — Verdure Markets</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    :root { --carbon-accent: #2D4A3E; --carbon-accent-light: #E8EFEA; }
    .carbon-hero { background: linear-gradient(135deg,#1F332A,#2D4A3E); color: white; padding: var(--space-12) 0 var(--space-10); }
    .carbon-hero h1 { font-size: var(--font-size-3xl); font-weight: 800; letter-spacing: -0.02em; }
    .carbon-hero p { color: rgba(255,255,255,0.85); margin-top: var(--space-3); font-size: var(--font-size-base); }
    .carbon-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--carbon-accent-light); color: var(--carbon-accent); font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold); padding: 4px 10px; border-radius: 999px; }
    .carbon-badge.dark { background: rgba(0,0,0,0.35); color: white; }
    .carbon-verified { background: #D1FAE5; color: #065F46; border-radius: 999px; padding: 4px 10px; font-size: var(--font-size-xs); font-weight: 700; }
    .carbon-section { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-6); margin-bottom: var(--space-5); box-shadow: var(--shadow-sm); }
    .carbon-section h2 { font-size: var(--font-size-lg); font-weight: 700; padding-bottom: var(--space-3); border-bottom: 1px solid var(--color-border); margin-bottom: var(--space-4); }
    .carbon-sidebar { position: sticky; top: calc(60px + var(--space-4)); }
    .carbon-cobenefits { display: flex; flex-wrap: wrap; gap: 8px; }
    .carbon-cobenefit { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: 999px; padding: 4px 12px; font-size: var(--font-size-xs); color: var(--color-text-muted); }
    .doc-list a { display: flex; align-items: center; gap: 8px; padding: 8px 0; color: var(--carbon-accent); text-decoration: none; }
    .doc-list a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav id="bm-nav-placeholder" style="background:var(--color-surface);border-bottom:1px solid var(--color-border);height:60px"></nav>

  <section class="carbon-hero">
    <div class="container" id="carbon-hero-content"></div>
  </section>

  <section class="listings-section">
    <div class="container" style="display:grid;grid-template-columns:1fr 360px;gap:28px;align-items:start">
      <div id="carbon-main"></div>
      <div class="carbon-sidebar" id="carbon-sidebar"></div>
    </div>
  </section>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="js/ui-utils.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth-state.js"></script>
  <script src="js/carbon-data.js"></script>
  <script>
    (function() {
      var db = firebase.firestore();

      function benefitIcon(label) {
        var l = (label || '').toLowerCase();
        if (l.indexOf('soil') !== -1) return '🌱';
        if (l.indexOf('water') !== -1) return '💧';
        if (l.indexOf('habitat') !== -1 || l.indexOf('biodiversity') !== -1) return '🦉';
        if (l.indexOf('air') !== -1) return '🌬️';
        if (l.indexOf('community') !== -1 || l.indexOf('jobs') !== -1) return '🤝';
        if (l.indexOf('innovation') !== -1) return '🔬';
        return '✅';
      }

      function getParam(name) {
        var m = new RegExp('[?&]' + name + '=([^&]+)').exec(location.search);
        return m ? decodeURIComponent(m[1]) : '';
      }

      function renderListing(l) {
        var hero = document.getElementById('carbon-hero-content');
        var main = document.getElementById('carbon-main');
        var sidebar = document.getElementById('carbon-sidebar');
        if (!l) {
          hero.innerHTML = '<h1>Listing not found</h1>';
          main.innerHTML = '<p style="color:var(--color-text-muted)">We could not find this carbon listing.</p>';
          return;
        }

        var totalValue = Number(l.pricePerTonne || 0) * Number(l.volumeTonnes || 0);

        hero.innerHTML =
          '<div style="display:flex;flex-direction:column;gap:var(--space-3)">' +
            '<div style="display:flex;gap:var(--space-2);flex-wrap:wrap">' +
              '<span class="carbon-badge">' + l.projectType.replace('_',' ') + '</span>' +
              '<span class="carbon-badge dark">' + l.standard + '</span>' +
              '<span class="carbon-badge">' + l.vintageYear + '</span>' +
              (l.verified ? '<span class="carbon-verified">✓ Verified</span>' : '') +
            '</div>' +
            '<h1>' + l.projectName + '</h1>' +
            '<p>' + l.projectLocation + '</p>' +
          '</div>';

        main.innerHTML =
          '<div class="carbon-section">' +
            '<h2>Project overview</h2>' +
            '<p style="color:var(--color-text-secondary);line-height:1.7">' + (l.description || 'This project generates verified carbon credits through measurable reductions or removals.') + '</p>' +
          '</div>' +
          '<div class="carbon-section">' +
            '<h2>Co-benefits</h2>' +
            '<div class="carbon-cobenefits">' +
              (l.cobenefits || []).map(function(b) {
                return '<span class="carbon-cobenefit">' + benefitIcon(b) + ' ' + b + '</span>';
              }).join('') +
            '</div>' +
          '</div>' +
          '<div class="carbon-section">' +
            '<h2>Project details</h2>' +
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4)">' +
              '<div><div style="font-size:var(--font-size-xs);color:var(--color-text-muted)">Location</div><div style="font-weight:600">' + l.projectLocation + '</div></div>' +
              '<div><div style="font-size:var(--font-size-xs);color:var(--color-text-muted)">Standard</div><div style="font-weight:600">' + l.standard + '</div></div>' +
              '<div><div style="font-size:var(--font-size-xs);color:var(--color-text-muted)">Vintage year</div><div style="font-weight:600">' + l.vintageYear + '</div></div>' +
              '<div><div style="font-size:var(--font-size-xs);color:var(--color-text-muted)">Project type</div><div style="font-weight:600">' + l.projectType.replace('_',' ') + '</div></div>' +
            '</div>' +
          '</div>' +
          '<div class="carbon-section">' +
            '<h2>Methodology</h2>' +
            '<p style="color:var(--color-text-secondary);line-height:1.7">' + (l.methodology || 'Project methodology documentation available in the registry and linked documents below.') + '</p>' +
          '</div>' +
          '<div class="carbon-section">' +
            '<h2>Documents</h2>' +
            '<div class="doc-list">' +
              (l.documents || []).map(function(d) {
                return '<a href="' + d + '" target="_blank" rel="noopener">📄 Document</a>';
              }).join('') +
              (l.documents && l.documents.length ? '' : '<p style="color:var(--color-text-muted)">No documents provided.</p>') +
            '</div>' +
          '</div>' +
          '<div class="carbon-section">' +
            '<h2>Registry</h2>' +
            (l.registryUrl
              ? '<a href="' + l.registryUrl + '" target="_blank" rel="noopener" style="color:var(--carbon-accent);text-decoration:none">🔗 View registry entry</a>'
              : '<p style="color:var(--color-text-muted)">No registry link provided.</p>') +
          '</div>';

        sidebar.innerHTML =
          '<div class="carbon-section">' +
            '<div style="font-size:var(--font-size-2xl);font-weight:700;color:var(--carbon-accent)">$' + l.pricePerTonne + '/tonne</div>' +
            '<div style="font-size:var(--font-size-sm);color:var(--color-text-muted);margin-top:4px">' + Number(l.volumeTonnes).toLocaleString() + ' tCO₂e available</div>' +
            '<div style="margin-top:var(--space-4);padding-top:var(--space-4);border-top:1px solid var(--color-border)">' +
              '<div style="font-size:var(--font-size-xs);color:var(--color-text-muted)">Total value</div>' +
              '<div style="font-size:var(--font-size-lg);font-weight:700">$' + Math.round(totalValue).toLocaleString() + '</div>' +
            '</div>' +
            '<button id="carbon-purchase-btn" class="btn btn-primary" style="margin-top:var(--space-4);width:100%">Start purchase</button>' +
            '<a href="mailto:' + (l.contactEmail || '') + '" class="btn btn-secondary" style="margin-top:var(--space-2);width:100%;text-align:center">Contact seller</a>' +
          '</div>';

        document.getElementById('carbon-purchase-btn').addEventListener('click', function() {
          var user = firebase.auth().currentUser;
          if (!user) {
            window.location.href = 'auth.html';
            return;
          }
          db.collection('carbon_deals').add({
            listingId: l.id,
            listing: l,
            buyerUID: user.uid,
            status: 'Pending',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          }).then(function(ref) {
            window.location.href = 'carbon-dealroom.html?deal=' + ref.id;
          });
        });
      }

      function loadListing() {
        var id = getParam('id');
        var demo = (window.CARBON_LISTINGS || []).find(function(l) { return String(l.id) === String(id); });
        if (demo) { renderListing(demo); return; }
        db.collection('carbon_listings').doc(id).get().then(function(doc) {
          if (doc.exists) {
            var d = doc.data();
            d.id = doc.id;
            renderListing(d);
            return;
          }
          renderListing(null);
        }).catch(function() { renderListing(null); });
      }

      loadListing();
    })();
  </script>
</body>
</html>
