<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedstock Listing — Biochar.market</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    .fs-detail-hero { background: linear-gradient(135deg, #7A5C1E 0%, #5C4415 100%); padding: var(--space-12) 0 var(--space-10); color: white; }
    .fs-detail-hero h1 { font-size: var(--font-size-3xl); font-weight: 800; letter-spacing: -0.02em; }
    .fs-detail-hero p { color: rgba(255,255,255,0.8); margin-top: var(--space-2); }
    .fs-detail-grid { display: grid; grid-template-columns: 1fr 340px; gap: var(--space-8); margin-top: var(--space-8); align-items: start; }
    .fs-detail-section { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-6); margin-bottom: var(--space-5); box-shadow: var(--shadow-sm); }
    .fs-detail-section h2 { font-size: var(--font-size-lg); font-weight: 700; margin-bottom: var(--space-4); padding-bottom: var(--space-3); border-bottom: 1px solid var(--color-border); color: var(--color-text-primary); }
    .fs-spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
    .fs-spec-item { background: var(--color-bg); border-radius: var(--radius-md); padding: var(--space-3) var(--space-4); }
    .fs-spec-item .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-muted); margin-bottom: 4px; }
    .fs-spec-item .value { font-size: var(--font-size-sm); font-weight: 600; color: var(--color-text-primary); }
    .fs-spec-item .label { font-size: var(--font-size-xs); color: var(--color-text-muted); text-transform: uppercase; font-weight: 600; }
    .fs-spec-item .value { font-weight: 600; margin-top: 2px; }
    .fs-tag-clean { color: var(--color-accent); }
    .fs-tag-soil { color: #DC2626; }
    .fs-tag-warn { color: #B45309; }
    .fs-photo-gallery { display: flex; flex-wrap: wrap; gap: var(--space-2); margin-bottom: var(--space-4); }
    .fs-photo-gallery img { width: 120px; height: 90px; object-fit: cover; border-radius: var(--radius-md); border: 1px solid var(--color-border); }
    .fs-photo-strip { display: flex; flex-wrap: wrap; gap: var(--space-2); }
    .fs-photo-strip img { width: 72px; height: 56px; object-fit: cover; border-radius: var(--radius-md); border: 1px solid var(--color-border); }
    .fs-sidebar-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-6); margin-bottom: var(--space-4); box-shadow: var(--shadow-sm); }
    .fs-sidebar-col .fs-sidebar-card:first-child { position: sticky; top: calc(60px + var(--space-4)); }
    .yield-box { background: var(--color-accent-light); border: 1px solid var(--color-accent); border-radius: var(--radius-md); padding: var(--space-4); margin-top: var(--space-4); }
    .agg-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); align-items:center; justify-content:center; }
    .agg-modal-overlay.open { display:flex; }
    .agg-modal { background:var(--color-surface); border-radius:var(--radius-lg); padding:var(--space-6); max-width:560px; width:90%; max-height:80vh; overflow-y:auto; position:relative; }
    .agg-modal h2 { font-size:var(--font-size-lg); font-weight:700; margin-bottom:var(--space-2); }
    .agg-modal-close { position:absolute; top:var(--space-4); right:var(--space-4); background:none; border:none; font-size:1.2rem; cursor:pointer; color:var(--color-text-muted); }
    .agg-result-card { border:1px solid var(--color-border); border-radius:var(--radius-md); padding:var(--space-4); margin-top:var(--space-3); }
    .agg-result-card h3 { font-size:var(--font-size-base); font-weight:600; margin-bottom:var(--space-1); }
    .agg-result-card .agg-meta { font-size:var(--font-size-sm); color:var(--color-text-muted); margin-bottom:var(--space-3); }
    .agg-result-card .agg-tags { display:flex; flex-wrap:wrap; gap:var(--space-2); margin-bottom:var(--space-3); }
    .agg-result-card .agg-tag { background:var(--color-bg); border:1px solid var(--color-border); border-radius:var(--radius-sm); padding:2px var(--space-2); font-size:var(--font-size-xs); color:var(--color-text-secondary); }
    .agg-result-card .agg-distance { font-size:var(--font-size-sm); font-weight:600; color:var(--color-accent); }
    .fs-availability-timeline { margin-top:var(--space-4); border:1px solid var(--color-border); border-radius:var(--radius-md); padding:var(--space-4); background:var(--color-bg); }
    .fs-availability-head { display:flex; justify-content:space-between; gap:var(--space-4); margin-bottom:var(--space-3); font-size:var(--font-size-sm); }
    .fs-availability-head strong { display:block; color:var(--color-text-primary); }
    .fs-availability-label { display:block; font-size:11px; color:var(--color-text-muted); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:4px; }
    .fs-availability-bar { height:10px; border-radius:999px; background:#E5E7EB; overflow:hidden; }
    .fs-availability-fill { height:100%; border-radius:999px; background:linear-gradient(90deg,#7A5C1E,#C29045); }
    .fs-availability-pill { display:inline-block; margin-top:var(--space-3); padding:4px 10px; border-radius:999px; font-size:var(--font-size-xs); font-weight:700; }
    .fs-availability-pill.ready { background:#DCFCE7; color:#166534; }
    .fs-availability-pill.warn { background:#FEF3C7; color:#B45309; }
    .fs-availability-pill.muted { background:var(--color-bg); color:var(--color-text-muted); }
  </style>
</head>
<body>
  <nav id="bm-nav-placeholder" style="background:var(--color-surface);border-bottom:1px solid var(--color-border);height:60px"></nav>

  <div style="background:var(--color-bg);border-bottom:1px solid var(--color-border);padding:var(--space-3) 0">
    <div class="container">
    </div>
  </div>

  <div id="fs-detail-hero" class="fs-detail-hero">
    <div class="container">
      <div id="fs-hero-content"><p style="color:rgba(255,255,255,0.6)">Loading…</p></div>
    </div>
  </div>

  <main class="container" style="padding-bottom:var(--space-12)">
    <div class="fs-detail-grid">
      <div id="fs-main-col">
        <div id="fs-detail-body"></div>
      </div>
      <div id="fs-sidebar-col">
        <div id="fs-sidebar"></div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>© 2026 Biochar.market</span>
    </div>
  </footer>

  <script src="js/firebase-config.js"></script>
  <script src="js/ui-utils.js"></script>
  <script src="js/auth-state.js"></script>
  <script src="js/delivered-cost.js"></script>
  <script src="js/feedstock-data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var body = document.getElementById('fs-detail-body');
      var hero = document.getElementById('fs-hero-content');
      if (body && window.UIUtils) UIUtils.showLoading('fs-detail-body', 'Loading listing...');
      else if (body) body.innerHTML = '<p style="padding:var(--space-8);color:var(--color-text-muted)">Loading listing...</p>';
      if (hero) hero.innerHTML = '<p style="color:rgba(255,255,255,0.6)">Loading…</p>';
    });
    var BIOMASS_LABELS = {
      orchard_prunings:'Orchard Prunings', almond_shells:'Almond Shells',
      pistachio_shells:'Pistachio Shells', walnut_shells:'Walnut Shells',
      corn_stover:'Corn Stover', rice_husks:'Rice Husks',
      forestry_slash:'Forestry Slash', logging_residue:'Logging Residue',
      thinning_material:'Thinning Material', clean_wood_waste:'Clean Wood Waste',
      construction_wood:'Construction Wood', tree_service_chips:'Tree Service Chips'
    };
    var MOISTURE_LABELS = { under_20:'Under 20%', '20_30':'20–30%', '30_40':'30–40%', over_40:'Over 40%' };
    var CONTAMINATION_LABELS = {
      certified_clean: '✓ Certified clean',
      clean: 'Clean',
      possible_soil: 'Possible soil contact',
      bark_included: 'Bark / organic matter',
      some_soil: 'Some soil contamination',
      possible_treated: 'Possible treated wood',
      mixed_debris: 'Mixed debris',
      unknown: 'Unknown / unverified'
    };
    var PARTICLE_LABELS = {
      fine_dust: 'Fine dust / powder (<5mm)',
      fine_chips: 'Fine chips (5–25mm)',
      chipped: 'Chipped (25–75mm)',
      shredded: 'Shredded / mulched',
      coarse_chunks: 'Coarse chunks (75–150mm)',
      whole_limbs: 'Whole limbs (150mm+)',
      baled: 'Baled',
      mixed: 'Mixed / unsorted'
    };
    var SUPPLIER_LABELS = { farmer:'Farmer', sawmill:'Sawmill', forestry_operator:'Forestry Operator', tree_service:'Tree Service', recycler:'Recycler' };
    var LOADING_LABELS = { pile:'Pile (bring your own loader)', loader_onsite:'Loader on site', conveyor:'Conveyor available', forklift:'Forklift available' };
    var AGE_LABELS = { fresh:'Fresh (this season)', less_6mo:'Less than 6 months', '6_12mo':'6–12 months', over_1yr:'Over 1 year' };


    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function toDateOnly(value) {
      if (!value) return null;
      var date = value instanceof Date ? new Date(value.getTime()) : new Date(value);
      if (isNaN(date.getTime())) return null;
      date.setHours(0, 0, 0, 0);
      return date;
    }

    function daysBetween(start, end) {
      return Math.round((end - start) / 86400000);
    }

    function formatShortDate(value) {
      var date = toDateOnly(value);
      if (!date) return '—';
      return date.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    }

    function formatMonthYear(value) {
      var date = toDateOnly(value);
      if (!date) return '';
      return date.toLocaleDateString('en-US', { month:'long', year:'numeric' });
    }

    function availabilityMeta(l) {
      var today = toDateOnly(new Date());
      var from = toDateOnly(l.availableFrom);
      var until = toDateOnly(l.availableUntil);
      var indicatorText = l.availabilityWindow || 'Availability on request';
      var indicatorClass = 'muted';
      if (from && from > today) {
        var daysUntil = daysBetween(today, from);
        if (daysUntil <= 30) {
          indicatorText = '🕐 Available in ' + daysUntil + ' day' + (daysUntil !== 1 ? 's' : '');
          indicatorClass = 'warn';
        } else {
          indicatorText = 'Available ' + formatMonthYear(from);
        }
      } else if (until) {
        var daysLeft = daysBetween(today, until);
        if (daysLeft <= 14) {
          indicatorText = '⚠ Available now · Expires in ' + Math.max(daysLeft, 0) + ' day' + (Math.max(daysLeft, 0) !== 1 ? 's' : '');
          indicatorClass = 'warn';
        } else {
          indicatorText = '✓ Available now · Until ' + formatShortDate(until);
          indicatorClass = 'ready';
        }
      }
      var fillPercent = 100;
      if (from && until && until > from) {
        if (today <= from) fillPercent = 0;
        else if (today >= until) fillPercent = 100;
        else fillPercent = Math.max(0, Math.min(100, Math.round(((today - from) / (until - from)) * 100)));
      }
      return {
        text: indicatorText,
        pillClass: indicatorClass,
        timeline:
          '<div class="fs-availability-timeline">' +
            '<div class="fs-availability-head">' +
              '<div><span class="fs-availability-label">From</span><strong>' + (from ? formatShortDate(from) : 'Now') + '</strong></div>' +
              '<div style="text-align:right"><span class="fs-availability-label">Until</span><strong>' + (until ? formatShortDate(until) : 'Open ended') + '</strong></div>' +
            '</div>' +
            '<div class="fs-availability-bar"><div class="fs-availability-fill" style="width:' + fillPercent + '%"></div></div>' +
            '<div class="fs-availability-pill ' + indicatorClass + '">' + indicatorText + '</div>' +
          '</div>'
      };
    }

    function renderListing(l) {
      window._renderedListing = l;
      if (!l) { document.getElementById('fs-detail-body').innerHTML = '<p style="padding:var(--space-8);color:var(--color-text-muted)">Listing not found.</p>'; return; }
      var biomassLabel = BIOMASS_LABELS[l.biomassType] || l.biomassType || 'Biomass';
      var yieldRatio = (window.FEEDSTOCK_YIELD_RATIOS || {})[l.biomassType];
      var yieldTons = yieldRatio ? Math.round(l.estimatedQuantityTons * yieldRatio) : null;
      var availMeta = availabilityMeta(l);
      l.estimatedQuantityTons = l.estimatedQuantityTons || 0;
      l.minimumPickupTons = l.minimumPickupTons || 0;
      l.pricePerTon = l.pricePerTon || 0;
      l.contactEmail = l.contactEmail || '';

      // Hero
      document.getElementById('fs-hero-content').innerHTML =
        '<h1>' + biomassLabel + '</h1>' +
        '<p>' + (l.company || l.supplierName || '') +
          (l.supplierVerified ? ' <span class="verified-badge">✓ Verified</span>' : '') +
          ' · ' + (SUPPLIER_LABELS[l.supplierType] || '') + ' · ZIP ' + (l.locationZip || '') + '</p>';

      // Hero background and photo strip
      var heroEl = document.getElementById('fs-detail-hero');
      if (heroEl && l.photos && l.photos.length) {
        heroEl.style.backgroundImage = 'linear-gradient(135deg, rgba(122,92,30,0.7), rgba(92,68,21,0.7)), url(' + l.photos[0] + ')';
        heroEl.style.backgroundSize = 'cover';
        heroEl.style.backgroundPosition = 'center';
      } else if (heroEl) {
        heroEl.style.backgroundImage = 'linear-gradient(135deg, #7A5C1E 0%, #5C4415 100%)';
        heroEl.style.backgroundSize = '';
        heroEl.style.backgroundPosition = '';
      }

      var photoStripHtml = '';
      if (l.photos && l.photos.length) {
        photoStripHtml = '<div class="fs-photo-strip">' +
          l.photos.map(function(p) { return '<a href=\"' + p + '\" target=\"_blank\" rel=\"noopener\"><img src=\"' + p + '\" alt=\"Material photo\"></a>'; }).join('') +
        '</div>';
      }

      // Main body
      document.getElementById('fs-detail-body').innerHTML =

        '<div class="fs-detail-section">' +
          '<h2>Material specs</h2>' +
          '<div class="fs-spec-grid">' +
            '<div class="fs-spec-item"><div class="label">Biomass type</div><div class="value">' + biomassLabel + '</div></div>' +
            '<div class="fs-spec-item"><div class="label">Quantity available</div><div class="value">' + l.estimatedQuantityTons.toLocaleString() + ' tons</div></div>' +
            '<div class="fs-spec-item"><div class="label">Minimum pickup</div><div class="value">' + l.minimumPickupTons + ' tons</div></div>' +
            '<div class="fs-spec-item"><div class="label">Price</div><div class="value">' + (l.pricePerTon === 0 ? 'Free to haul' : '$' + l.pricePerTon + '/ton' + (l.negotiable ? ' (negotiable)' : '')) + '</div></div>' +
            '<div class="fs-spec-item"><div class="label">Moisture content</div><div class="value">' + (MOISTURE_LABELS[l.moistureContent] || l.moistureContent || '—') + '</div></div>' +
            '<div class="fs-spec-item"><div class="label">Particle size</div><div class="value">' + (PARTICLE_LABELS[l.particleSize] || l.particleSize || '—') + '</div></div>' +
            (l.contaminationDebris || l.contaminationAsh || l.contaminationChemical
              ? '<div class="fs-spec-item" style="grid-column:1/-1"><div class="label" style="margin-bottom:var(--space-2)">Contamination scores <span style="font-size:10px;color:var(--color-text-muted);font-weight:400">(1 = cleanest · 5 = highest risk)</span></div>' +
                '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--space-3)">' +
                  '<div style="background:var(--color-bg);border-radius:var(--radius-md);padding:var(--space-3)">' +
                    '<div style="font-size:11px;color:var(--color-text-muted);text-transform:uppercase;font-weight:600">Physical debris</div>' +
                    '<div style="font-size:var(--font-size-xl);font-weight:700;color:' + (parseInt(l.contaminationDebris||1)<=2?'var(--color-accent)':parseInt(l.contaminationDebris||1)<=3?'#B45309':'#DC2626') + '">' + (l.contaminationDebris||'—') + '<span style="font-size:12px;color:var(--color-text-muted)">/5</span></div>' +
                    '<div style="font-size:11px;color:var(--color-text-muted);margin-top:2px">Rocks, wire, plastic</div>' +
                    '<div style="font-size:10px;color:var(--color-text-muted);margin-top:4px">Verify: visual inspection at delivery</div>' +
                  '</div>' +
                  '<div style="background:var(--color-bg);border-radius:var(--radius-md);padding:var(--space-3)">' +
                    '<div style="font-size:11px;color:var(--color-text-muted);text-transform:uppercase;font-weight:600">Soil / ash content</div>' +
                    '<div style="font-size:var(--font-size-xl);font-weight:700;color:' + (parseInt(l.contaminationAsh||1)<=2?'var(--color-accent)':parseInt(l.contaminationAsh||1)<=3?'#B45309':'#DC2626') + '">' + (l.contaminationAsh||'—') + '<span style="font-size:12px;color:var(--color-text-muted)">/5</span></div>' +
                    '<div style="font-size:11px;color:var(--color-text-muted);margin-top:2px">Impact on char yield</div>' +
                    '<div style="font-size:10px;color:var(--color-text-muted);margin-top:4px">Verify: ASTM E1755 ash test</div>' +
                  '</div>' +
                  '<div style="background:var(--color-bg);border-radius:var(--radius-md);padding:var(--space-3)">' +
                    '<div style="font-size:11px;color:var(--color-text-muted);text-transform:uppercase;font-weight:600">Chemical risk</div>' +
                    '<div style="font-size:var(--font-size-xl);font-weight:700;color:' + (parseInt(l.contaminationChemical||1)<=2?'var(--color-accent)':parseInt(l.contaminationChemical||1)<=3?'#B45309':'#DC2626') + '">' + (l.contaminationChemical||'—') + '<span style="font-size:12px;color:var(--color-text-muted)">/5</span></div>' +
                    '<div style="font-size:11px;color:var(--color-text-muted);margin-top:2px">Treated wood, pesticides, metals</div>' +
                    '<div style="font-size:10px;color:var(--color-text-muted);margin-top:4px">Verify: EPA 3051A metals panel</div>' +
                  '</div>' +
                '</div>' +
              '</div>'
              : '<div class="fs-spec-item"><div class="label">Contamination risk</div><div class="value">' + (CONTAMINATION_LABELS[l.contaminationRisk] || l.contaminationRisk || 'Not scored') + '</div></div>') +
            '<div class="fs-spec-item"><div class="label">Age of material</div><div class="value">' + (AGE_LABELS[l.ageOfMaterial] || l.ageOfMaterial || '—') + '</div></div>' +
            '<div class="fs-spec-item"><div class="label">Loading</div><div class="value">' + (LOADING_LABELS[l.loadingType] || l.loadingType || '—') + '</div></div>' +
            '<div class="fs-spec-item" style="grid-column:1/-1"><div class="label">Availability window</div><div class="value">' + availMeta.timeline + '</div></div>' +
          '</div>' +
        '</div>' +

        (l.notes ? '<div class="fs-detail-section"><h2>Supplier notes</h2><p style="line-height:1.7;color:var(--color-text-secondary)">' + l.notes + '</p></div>' : '') +

        (yieldTons ? '<div class="fs-detail-section"><h2>Pyrolysis yield estimate</h2>' +
          '<div class="yield-box">' +
            '<div style="font-size:var(--font-size-sm);color:var(--color-text-muted)">At ' + Math.round((yieldRatio||0)*100) + '% yield ratio for ' + biomassLabel.toLowerCase() + ':</div>' +
            '<div style="font-size:var(--font-size-xl);font-weight:700;color:var(--color-accent);margin-top:var(--space-2)">' + yieldTons.toLocaleString() + ' tonnes of biochar</div>' +
            '<div style="font-size:var(--font-size-sm);color:var(--color-text-muted);margin-top:var(--space-1)">from ' + l.estimatedQuantityTons.toLocaleString() + ' tons of feedstock</div>' +
          '</div>' +
        '</div>' : '') +

        '<div class="fs-detail-section" id="fs-cost-section">' +
          '<h2>Delivered cost estimate</h2>' +
          '<div style="display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-3)">' +
            '<input id="fs-buyer-zip" type="text" maxlength="5" placeholder="Your ZIP code" style="width:120px;height:40px;border:1px solid var(--color-border);border-radius:var(--radius-md);padding:0 var(--space-3);font-size:var(--font-size-sm)" />' +
            '<button id="fs-calc-btn" class="btn btn-primary" style="height:40px">Calculate</button>' +
          '</div>' +
          '<div id="fs-cost-result" style="font-size:var(--font-size-sm);color:var(--color-text-muted)">Enter your ZIP to estimate transport cost.</div>' +
        '</div>';

      // Sidebar
      document.getElementById('fs-sidebar').innerHTML =
        (photoStripHtml ? '<div class="fs-sidebar-card">' + photoStripHtml + '</div>' : '') +
        '<div class="fs-sidebar-card">' +
          '<div style="font-size:var(--font-size-2xl);font-weight:700;color:#7A5C1E">' + (l.pricePerTon === 0 ? 'Free to haul' : '$' + l.pricePerTon + '/ton') + '</div>' +
          (l.negotiable ? '<div style="font-size:var(--font-size-sm);color:var(--color-text-muted);margin-top:2px">Price negotiable</div>' : '') +
          '<div style="margin-top:var(--space-3);font-size:var(--font-size-sm);color:var(--color-text-muted)">' +
            '<span class="fs-availability-pill ' + availMeta.pillClass + '">' + availMeta.text + '</span>' +
          '</div>' +
          '<div style="margin:var(--space-4) 0;border-top:1px solid var(--color-border);padding-top:var(--space-4);display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)">' +
            '<div><div style="font-size:var(--font-size-xs);color:var(--color-text-muted);text-transform:uppercase;font-weight:600">Available</div><div style="font-weight:700;margin-top:2px">' + l.estimatedQuantityTons.toLocaleString() + ' tons</div></div>' +
            '<div><div style="font-size:var(--font-size-xs);color:var(--color-text-muted);text-transform:uppercase;font-weight:600">Min pickup</div><div style="font-weight:700;margin-top:2px">' + l.minimumPickupTons + ' tons</div></div>' +
            (l.harvestDate ? '<div><div style="font-size:var(--font-size-xs);color:var(--color-text-muted);text-transform:uppercase;font-weight:600">Harvest date</div><div style="font-weight:600;margin-top:2px">' + l.harvestDate + '</div></div>' : '') +
            '<div><div style="font-size:var(--font-size-xs);color:var(--color-text-muted);text-transform:uppercase;font-weight:600">Loading</div><div style="font-weight:600;margin-top:2px">' + (LOADING_LABELS[l.loadingType] || l.loadingType || '—') + '</div></div>' +
          '</div>' +
          '<a id="fs-contact-btn" href="mailto:' + (l.contactEmail || '') + '" class="btn btn-primary" style="width:100%;text-align:center;display:block;margin-bottom:var(--space-3)">Contact supplier</a>' +
          '<p style="font-size:var(--font-size-xs);color:var(--color-text-muted);text-align:center">Listing price excludes transport. Use cost calculator to estimate delivered price.</p>' +
        '</div>' +

        '<div class="fs-sidebar-card" style="background:linear-gradient(135deg,#7A5C1E15,#7A5C1E08)">' +
          '<p style="font-size:var(--font-size-sm);font-weight:600;margin-bottom:var(--space-2)">🔥 Are you a biochar producer?</p>' +
          '<p style="font-size:var(--font-size-sm);color:var(--color-text-muted);margin-bottom:var(--space-3)">Post a demand listing to get matched with feedstock suppliers in your area.</p>' +
        '</div>' +

        '<div class="fs-sidebar-card" style="background:linear-gradient(135deg,#3D6B4510,#3D6B4508)">' +
          '<p style="font-size:var(--font-size-sm);font-weight:600;margin-bottom:var(--space-2)">🌾 Need someone to take this material?</p>' +
          '<p style="font-size:var(--font-size-sm);color:var(--color-text-muted);margin-bottom:var(--space-3)">Find biochar producers and aggregators near you who accept ' + biomassLabel + '.</p>' +
          '<button id="find-aggregator-btn" class="btn btn-secondary" style="width:100%;font-size:var(--font-size-sm)">Find a processor near me</button>' +
        '</div>';

      // Cost calculator
      document.getElementById('fs-calc-btn').addEventListener('click', function() {
        var zip = document.getElementById('fs-buyer-zip').value.trim();
        var resultEl = document.getElementById('fs-cost-result');
        if (!zip || zip.length !== 5) { resultEl.textContent = 'Please enter a valid 5-digit ZIP.'; return; }
        if (!l.locationZip) { resultEl.textContent = 'Supplier ZIP not available for this listing.'; return; }
        resultEl.setAttribute('data-delivered-cost-status', 'true');
        resultEl.textContent = 'Calculating…';
        window.DeliveredCost.calc({
          producerZip: l.locationZip,
          buyerZip: zip,
          pricePerTonne: l.pricePerTon,
          tonnes: l.minimumPickupTons,
          isBiochar: false,
          feedstockType: l.biomassType
        }).then(function(r) {
          resultEl.innerHTML =
            '<strong style="font-size:var(--font-size-lg);color:#7A5C1E">~$' + Math.round(r.deliveredPerTonne) + '/ton delivered</strong>' +
            '<div style="margin-top:var(--space-2);color:var(--color-text-muted)">' +
              'Material $' + Math.round(r.materialCost).toLocaleString() +
              ' &nbsp;+&nbsp; Transport $' + Math.round(r.transportCost).toLocaleString() +
              ' &nbsp;(' + r.distance + ' mi · ' + r.truckloads + ' truckload' + (r.truckloads > 1 ? 's' : '') + ')' +
            '</div>';
        }).catch(function() { resultEl.textContent = 'Could not calculate — check ZIP codes.'; });
      });
    }

    var _currentListing = null;

    function haversineAgg(lat1, lon1, lat2, lon2) {
      var R = 3958.8;
      var dLat = (lat2 - lat1) * Math.PI / 180;
      var dLon = (lon2 - lon1) * Math.PI / 180;
      var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
              Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
              Math.sin(dLon/2)*Math.sin(dLon/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function geocodeZipAgg(zip) {
      return fetch('https://api.zippopotam.us/us/' + zip)
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (!d.places || !d.places[0]) throw new Error('ZIP not found');
          return { lat: parseFloat(d.places[0].latitude), lon: parseFloat(d.places[0].longitude) };
        });
    }

    var BIOMASS_LABELS_MODAL = {
      orchard_prunings:'Orchard Prunings', almond_shells:'Almond Shells',
      pistachio_shells:'Pistachio Shells', walnut_shells:'Walnut Shells',
      corn_stover:'Corn Stover', rice_husks:'Rice Husks',
      forestry_slash:'Forestry Slash', logging_residue:'Logging Residue',
      thinning_material:'Thinning Material', clean_wood_waste:'Clean Wood Waste',
      construction_wood:'Construction Wood', tree_service_chips:'Tree Service Chips'
    };

    function openAggModal(listing) {
      _currentListing = listing;
      var overlay = document.getElementById('agg-modal-overlay');
      if (!overlay) return;
      overlay.classList.add('open');
      var results = document.getElementById('agg-results');
      var zipInput = document.getElementById('agg-zip-input');
      if (results) results.innerHTML = '';
      if (zipInput) zipInput.value = '';
    }

    document.addEventListener('click', function(e) {
      if (e.target && e.target.id === 'find-aggregator-btn') {
        openAggModal(_currentListing || window._renderedListing);
      }
      if (e.target && (e.target.id === 'agg-modal-close' || e.target.id === 'agg-modal-overlay')) {
        document.getElementById('agg-modal-overlay').classList.remove('open');
      }
      if (e.target && e.target.id === 'agg-search-btn') runAggSearch();
    });

    function runAggSearch() {
      var zip = document.getElementById('agg-zip-input').value.trim();
      var radius = parseInt(document.getElementById('agg-radius-select').value);
      var resultsEl = document.getElementById('agg-results');
      if (!zip || zip.length !== 5) {
        resultsEl.innerHTML = '<p style="color:#DC2626;font-size:var(--font-size-sm)">Please enter a valid 5-digit ZIP.</p>';
        return;
      }
      var biomassType = _currentListing ? _currentListing.biomassType : null;
      resultsEl.innerHTML = '<p style="color:var(--color-text-muted);font-size:var(--font-size-sm)">Searching…</p>';

      geocodeZipAgg(zip).then(function(buyerCoords) {
        var demands = [];
        var aggSuppliers = [];

        var demandQuery = firebase.firestore().collection('feedstock_demand')
          .where('status', '==', 'active')
          .get()
          .then(function(snap) {
            snap.forEach(function(doc) {
              var d = doc.data(); d._id = doc.id;
              if (!d.locationZip) return;
              var types = d.acceptedBiomassTypes || [];
              if (biomassType && types.length > 0 && types.indexOf(biomassType) === -1) return;
              demands.push(d);
            });
          });

        var aggQuery = firebase.firestore().collection('feedstock_listings')
          .where('status', '==', 'active')
          .get()
          .then(function(snap) {
            snap.forEach(function(doc) {
              var d = doc.data(); d._id = doc.id;
              if (!d.locationZip) return;
              if (d.supplierType !== 'aggregator' && d.supplierType !== 'broker') return;
              var types = d.biomassTypes || [];
              if (biomassType && types.length > 0 && types.indexOf(biomassType) === -1) return;
              aggSuppliers.push(d);
            });
          });

        return Promise.all([demandQuery, aggQuery]).then(function() {
          var allResults = [];

          function processWithGeocode(items, type) {
            return Promise.all(items.map(function(item) {
              return geocodeZipAgg(item.locationZip).then(function(coords) {
                var dist = haversineAgg(buyerCoords.lat, buyerCoords.lon, coords.lat, coords.lon);
                if (dist > radius) return null;
                var maxDist = parseInt(item.maxSourcingDistance) || 999;
                if (type === 'demand' && dist > maxDist) return null;
                return { item: item, dist: Math.round(dist), type: type };
              }).catch(function() { return null; });
            }));
          }

          return Promise.all([
            processWithGeocode(demands, 'demand'),
            processWithGeocode(aggSuppliers, 'aggregator')
          ]).then(function(groups) {
            groups.forEach(function(g) {
              g.forEach(function(r) { if (r) allResults.push(r); });
            });
            allResults.sort(function(a, b) { return a.dist - b.dist; });
            renderAggResults(allResults, biomassType, radius);
          });
        });
      }).catch(function() {
        resultsEl.innerHTML = '<p style="color:#DC2626;font-size:var(--font-size-sm)">Could not find that ZIP code. Please check and try again.</p>';
      });
    }

    function renderAggResults(results, biomassType, radius) {
      var resultsEl = document.getElementById('agg-results');
      if (!resultsEl) return;
      var biomassLabel = biomassType ? (BIOMASS_LABELS_MODAL[biomassType] || biomassType) : 'this material';

      if (results.length === 0) {
        resultsEl.innerHTML =
          '<div style="text-align:center;padding:var(--space-6) 0">' +
          '<div style="font-size:2rem;margin-bottom:var(--space-3)">🌾</div>' +
          '<p style="font-weight:600;margin-bottom:var(--space-2)">No processors found within ' + radius + ' miles</p>' +
          '<p style="font-size:var(--font-size-sm);color:var(--color-text-muted);margin-bottom:var(--space-4)">The network is growing. List your supply on the Biomass Market and producers will contact you directly when they need ' + biomassLabel + ' in your area.</p>' +
          '<a href="feedstock.html" class="btn btn-primary" style="font-size:var(--font-size-sm)">Browse the Biomass Market →</a>' +
          '</div>';
        return;
      }

      var html = '<p style="font-size:var(--font-size-sm);color:var(--color-text-muted);margin-bottom:var(--space-2)">' + results.length + ' match' + (results.length > 1 ? 'es' : '') + ' found</p>';

      results.forEach(function(r) {
        var item = r.item;
        var isProducer = r.type === 'demand';
        var name = item.company || item.producerName || item.supplierName || 'Unnamed';
        var contactEmail = item.contactEmail || '';

        var typeLabel = isProducer
          ? '🔥 Biochar producer seeking feedstock'
          : '📦 Biomass aggregator / processor';

        var acceptedTypes = isProducer
          ? (item.acceptedBiomassTypes || [])
          : (item.biomassTypes || []);

        var tagsHtml = acceptedTypes.length
          ? acceptedTypes.slice(0, 5).map(function(t) {
              return '<span class="agg-tag">' + (BIOMASS_LABELS_MODAL[t] || t) + '</span>';
            }).join('')
          : '<span class="agg-tag">Multiple types accepted</span>';

        var detailHtml = '';
        if (isProducer) {
          if (item.volumeNeeded) detailHtml += '<span style="font-size:var(--font-size-xs);color:var(--color-text-muted)">Needs: ' + item.volumeNeeded + ' ' + (item.volumePeriod || '') + '</span> &nbsp;·&nbsp; ';
          if (item.maxMoistureAccepted) detailHtml += '<span style="font-size:var(--font-size-xs);color:var(--color-text-muted)">Max moisture: ' + item.maxMoistureAccepted + '%</span> &nbsp;·&nbsp; ';
          if (item.pricePerTonMax) detailHtml += '<span style="font-size:var(--font-size-xs);color:var(--color-accent);font-weight:600">Pays up to $' + item.pricePerTonMax + '/ton</span>';
        } else {
          if (item.estimatedQuantityTons) detailHtml += '<span style="font-size:var(--font-size-xs);color:var(--color-text-muted)">Capacity: ' + item.estimatedQuantityTons.toLocaleString() + ' tons</span> &nbsp;·&nbsp; ';
          if (item.pricePerTon !== undefined) detailHtml += '<span style="font-size:var(--font-size-xs);color:var(--color-accent);font-weight:600">' + (item.pricePerTon === 0 ? 'Free to haul' : '$' + item.pricePerTon + '/ton') + '</span>';
        }

        html +=
          '<div class="agg-result-card">' +
            '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:var(--space-1)">' +
              '<h3>' + name + '</h3>' +
              '<span class="agg-distance">' + r.dist + ' mi</span>' +
            '</div>' +
            '<div class="agg-meta">' + typeLabel + '</div>' +
            (detailHtml ? '<div style="margin-bottom:var(--space-2)">' + detailHtml + '</div>' : '') +
            '<div class="agg-tags">' + tagsHtml + '</div>' +
            (contactEmail
              ? '<a href="mailto:' + contactEmail + '?subject=Feedstock inquiry: ' + biomassLabel + '&body=Hi ' + name + ',%0A%0AI have ' + biomassLabel + ' available and saw your listing on Biochar.market. I would like to discuss a potential supply arrangement.%0A%0A" class="btn btn-primary" style="font-size:var(--font-size-sm);padding:var(--space-2) var(--space-4)">Contact →</a>'
              : '<span style="font-size:var(--font-size-xs);color:var(--color-text-muted)">No contact info listed</span>') +
          '</div>';
      });

      resultsEl.innerHTML = html;
    }

    window.AuthState.onReady(function(user, profile) {
      var id = getParam('id');
      if (!id) { document.getElementById('fs-detail-body').innerHTML = '<p>Listing not found.</p>'; return; }

      // Try demo data first
      var allDemo = window.FEEDSTOCK_LISTINGS || window.FEEDSTOCK_DATA || window.feedstockListings || [];
      var demo = allDemo.find(function(l) { return String(l._id) === String(id) || String(l.id) === String(id); });
      if (demo) { renderListing(demo); return; }

      // Fall back to Firestore
      firebase.firestore().collection('feedstock_listings').doc(id).get()
        .then(function(doc) {
          if (!doc.exists) { document.getElementById('fs-hero-content').innerHTML = '<h1 style="color:rgba(255,255,255,0.6)">Listing not found</h1>'; return; }
          var l = doc.data();
          l._id = doc.id;
          renderListing(l);
        })
        .catch(function() {
          if (window.UIUtils) UIUtils.showError('fs-detail-body', 'Could not load listing.', function() { window.location.reload(); });
          document.getElementById('fs-hero-content').innerHTML = '<h1 style="color:rgba(255,255,255,0.6)">Error loading listing</h1>';
        });
    });
  </script>

  <div id="agg-modal-overlay" class="agg-modal-overlay">
    <div class="agg-modal">
      <button class="agg-modal-close" id="agg-modal-close">✕</button>
      <h2>Find a processor or aggregator</h2>
      <p style="font-size:var(--font-size-sm);color:var(--color-text-muted);margin-bottom:var(--space-4)">Find biochar producers and biomass aggregators near you who accept this material type.</p>
      <div style="display:flex;gap:var(--space-3);align-items:flex-end;margin-bottom:var(--space-4)">
        <div style="flex:1">
          <label style="font-size:var(--font-size-sm);font-weight:600;display:block;margin-bottom:var(--space-1)">Your ZIP code</label>
          <input id="agg-zip-input" type="text" maxlength="5" placeholder="e.g. 95678" style="width:100%;height:40px;border:1px solid var(--color-border);border-radius:var(--radius-md);padding:0 var(--space-3);font-size:var(--font-size-sm)" />
        </div>
        <div>
          <label style="font-size:var(--font-size-sm);font-weight:600;display:block;margin-bottom:var(--space-1)">Radius</label>
          <select id="agg-radius-select" style="height:40px;border:1px solid var(--color-border);border-radius:var(--radius-md);padding:0 var(--space-3);font-size:var(--font-size-sm);background:var(--color-surface)">
            <option value="50">50 mi</option>
            <option value="100" selected>100 mi</option>
            <option value="250">250 mi</option>
          </select>
        </div>
        <button id="agg-search-btn" class="btn btn-primary" style="height:40px;white-space:nowrap">Search</button>
      </div>
      <div id="agg-results"></div>
    </div>
  </div>
</body>
</html>
