<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verdure Markets</title>
    <meta name="description" content="Verdure Markets routing entry point." />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .route-loader {
        width: min(460px, calc(100% - 48px));
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm);
        padding: var(--space-8);
        text-align: center;
      }

      .route-loader h1 {
        font-size: var(--font-size-2xl);
        margin: 0 0 var(--space-3) 0;
      }

      .route-loader p {
        margin: 0;
        color: var(--color-text-secondary);
      }

      .route-spinner {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 3px solid var(--color-border);
        border-top-color: var(--color-accent);
        margin: 0 auto var(--space-5);
        animation: verdure-spin 0.8s linear infinite;
      }

      @keyframes verdure-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <main class="route-loader" aria-live="polite">
      <div class="route-spinner"></div>
      <h1>Verdure Markets</h1>
      <p>Routing you to the right marketplace view…</p>
    </main>

    <script>
      (function () {
        'use strict';

        function routeForUser(user, profile) {
          if (!user) return 'buyer.html';
          return profile && profile.role === 'seller' ? 'seller.html' : 'buyer.html';
        }

        firebase.auth().onAuthStateChanged(function (user) {
          if (!user) {
            window.location.replace('buyer.html');
            return;
          }

          firebase.firestore().collection('users').doc(user.uid).get()
            .then(function (doc) {
              var profile = doc.exists ? doc.data() : null;
              window.location.replace(routeForUser(user, profile));
            })
            .catch(function () {
              window.location.replace(routeForUser(user, null));
            });
        });
      })();
    </script>
  </body>
</html>
